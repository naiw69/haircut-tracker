<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Follicle" />
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f7f7;
      --bg-tertiary: #fafafa;
      --text-primary: #0a0a0a;
      --text-secondary: #555555;
      --text-tertiary: #888888;
      --border-light: #eeeeee;
      --border-medium: #e8e8e8;
      --border-color: #e0e0e0;
      
      --accent-color: #0a0a0a;
      --tabbar-bg: rgba(255, 255, 255, 0.75);
      --tabbar-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --tab-active-bg: #ffffff;
      
      --btn-primary-bg: #0a0a0a;
      --btn-primary-text: #ffffff;
      
      --backdrop-bg: rgba(0, 0, 0, 0.35);
      --sheet-bg: #ffffff;
      --sheet-shadow: 0 -4px 32px rgba(0, 0, 0, 0.10);
      --avatar-bg: #0a0a0a;
      
      --card-bg: #ffffff;

      --statcard-bg: #0a0a0a;
      --statcard-val: #ffffff;
      --statcard-label: #a0a0a0;
      --statcard-trend-up: #4caf50;
      --statcard-trend-down: #f44336;
      --statcard-trend-neutral: #888888;
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0a;
      --bg-secondary: #161616;
      --bg-tertiary: #1f1f1f;
      --text-primary: #f5f5f5;
      --text-secondary: #bbbbbb;
      --text-tertiary: #777777;
      --border-light: #222222;
      --border-medium: #2c2c2c;
      --border-color: #333333;
      
      --accent-color: #f5f5f5;
      --tabbar-bg: rgba(18, 18, 18, 0.85);
      --tabbar-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --tab-active-bg: #222222;
      
      --btn-primary-bg: #f5f5f5;
      --btn-primary-text: #0a0a0a;
      
      --backdrop-bg: rgba(0, 0, 0, 0.6);
      --sheet-bg: #161616;
      --sheet-shadow: 0 -4px 32px rgba(0, 0, 0, 0.4);
      --avatar-bg: #f5f5f5;
      
      --card-bg: #161616;

      --statcard-bg: #ffffff;
      --statcard-val: #0a0a0a;
      --statcard-label: #555555;
      --statcard-trend-up: #2e7d32;
      --statcard-trend-down: #c62828;
      --statcard-trend-neutral: #888888;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-primary);
      touch-action: pan-x pan-y;
      -webkit-text-size-adjust: 100%;
    }
    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
  <title>Follicle</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
